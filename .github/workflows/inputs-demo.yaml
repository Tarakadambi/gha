name: Inputs Demo
on: 
  workflow_dispatch: 
    inputs:
      environment:
        description: choose the environment to deploy
        required: true
        default: dev
        options:
          - dev
          - test
          - prod
       tag:
         description: choose the git tag to deploy
         required : true
jobs:
  inputs-demo:
    runs-on: ubuntu-latest
    steps:
       - name: deploy the App
         run: echo "Deploying the ${{ inputs.artifact_tag}} application to ${{ inputs.environment }}"
