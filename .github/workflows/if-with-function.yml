name: nice if example

on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  quality_check:
    if: startsWith(github.ref_name, 'feature') && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: perform code quality
        run: echo "performing quality checks on the code"

  dev_deploy:
    if: github.ref_name == 'develop' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: dev deploy
        run: echo "deploying to dev environment"

  prod_deploy:
    if: github.ref_name == 'main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: prod deploy
        run: echo "deploying to prod environment"

  success_notify:
    needs: [quality_check, dev_deploy, prod_deploy]
    if: always() && !failure()
    runs-on: ubuntu-latest

    steps:
      - name: notify success
        run: echo "success notify email sent to the team"

  failure_notify:
    needs: [quality_check, dev_deploy, prod_deploy]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: notify failure
        run: echo "failure notify email sent to the team"
