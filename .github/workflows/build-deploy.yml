name: Build & Deploy
on:
  push:
    branches: 
      - main  
  pull_request: 
    types: 
      - opened
      - synchronize
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    steps:
      - name: build step
        run: echo "building the application"
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - name: Deploy Step
        run: echp "Deploying the app"
